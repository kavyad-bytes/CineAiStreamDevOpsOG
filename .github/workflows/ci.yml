name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Build backend
      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests

      # 4. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 5. Build frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 6. Docker Login GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 7. Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/cineai-backend:latest ./backend

      # 8. Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/cineai-frontend:latest ./frontend

      # 9. Push Images
      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository }}/cineai-backend:latest
          docker push ghcr.io/${{ github.repository }}/cineai-frontend:latest