name: CineAI DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # Backend Build
      # -------------------------
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests

      # -------------------------
      # Frontend Build
      # -------------------------
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # -------------------------
      # SAST (Semgrep)
      # -------------------------
      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        continue-on-error: true

      # -------------------------
      # Docker Login (GHCR)
      # -------------------------
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      # -------------------------
      # Build Images (LOWERCASE FIX)
      # -------------------------
      - name: Build Backend Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }} ./backend
          docker tag ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/cineai-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }} ./frontend
          docker tag ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/cineai-frontend:latest

      # -------------------------
      # Install Trivy (NO VERSION ISSUE)
      # -------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # -------------------------
      # Image Scan
      # -------------------------
      - name: Trivy Scan Backend
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 0 ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }}

      - name: Trivy Scan Frontend
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 0 ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }}

      # -------------------------
      # Push Images
      # -------------------------
      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/cineai-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/cineai-frontend:latest

      # -------------------------
      # GitOps (Update K8s)
      # -------------------------
      - name: Update Kubernetes Image Tags
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i "s|image: .*cineai-backend:.*|image: ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }}|g" k8s/backend/backend.yaml
          sed -i "s|image: .*cineai-frontend:.*|image: ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }}|g" k8s/frontend/frontend.yaml

      - name: Commit Updated Manifests
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/backend/backend.yaml k8s/frontend/frontend.yaml
          git commit -m "update image tags to ${{ github.sha }}" || echo "No changes"
          git push

      # -------------------------
      # DAST (ZAP)
      # -------------------------
      - name: OWASP ZAP Scan
        if: github.ref == 'refs/heads/main'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://cineai.local"
          fail_action: false