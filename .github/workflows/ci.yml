name: CineAI DevSecOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          echo "BACKEND_IMAGE=ghcr.io/${{ github.repository_owner }}/cineai-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/cineai-frontend" >> $GITHUB_ENV

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: auto

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t $BACKEND_IMAGE:${{ github.sha }} \
            -t $BACKEND_IMAGE:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t $FRONTEND_IMAGE:${{ github.sha }} \
            -t $FRONTEND_IMAGE:latest \
            ./frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Push backend image
        if: github.event_name == 'push'
        run: |
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Push frontend image
        if: github.event_name == 'push'
        run: |
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest

      - name: Update Kubernetes manifests
        if: github.event_name == 'push'
        run: |
          sed -i "s|image: .*cineai-backend:.*|image: $BACKEND_IMAGE:${{ github.sha }}|g" k8s/backend/backend.yml
          sed -i "s|image: .*cineai-frontend:.*|image: $FRONTEND_IMAGE:${{ github.sha }}|g" k8s/frontend/frontend.yml

      - name: Commit manifest changes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/backend/backend.yml k8s/frontend/frontend.yml
          git commit -m "chore: update image tags [skip ci]" || echo "No manifest changes"
          git push

  zap-dast:
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start app with Docker Compose
        run: docker compose up -d --build

      - name: Wait for frontend
        run: |
          sleep 60
          curl -I http://localhost:5173

      - name: OWASP ZAP Baseline Scan
        run: |
          mkdir -p zap-output
          chmod -R 777 zap-output

          docker run --network host \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            zaproxy/zap-stable zap-baseline.py \
            -t http://localhost:5173 \
            -r zap-report.html \
            -w zap-report.md \
            -J zap-report.json \
            -I

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: zap-output

      - name: Stop app
        if: always()
        run: docker compose down