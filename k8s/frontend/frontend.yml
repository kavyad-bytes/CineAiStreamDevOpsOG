apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cineai
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: NodePort

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cineai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/kavyad-bytes/cineai-frontend:e569d2915f3f41203b9fd741289ae756d6ab3751
          ports:
            - containerPort: 80